<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potboy Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#e74c3c",
              "primary-dark": "#c0392b",
            },
            fontFamily: {
              averia: ['"Averia Serif Libre"', "serif"],
              helvetica: [
                '"Helvetica Neue"',
                "Helvetica",
                "Arial",
                "sans-serif",
              ],
              receipt: ['"Courier New"', "Courier", "monospace"],
            },
            backgroundImage: {
              "dashed-line":
                "url(\"data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='0' ry='0' stroke='black' stroke-width='2' stroke-dasharray='10%2c 10' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e\")",
            },
          },
        },
      };
    </script>
    <style>
      @font-face {
        font-family: "Averia Serif Libre";
        src: url("./assets/fonts/AveriaSerifLibre-Regular.ttf")
          format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: "Averia Serif Libre";
        src: url("./assets/fonts/AveriaSerifLibre-Bold.ttf") format("truetype");
        font-weight: bold;
        font-style: normal;
      }

      @font-face {
        font-family: "Helvetica Neue";
        src: url("./assets/fonts/Helvetica Neue LT Std 65 Medium.otf")
          format("opentype");
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: "Helvetica Neue";
        src: url("./assets/fonts/Helvetica Neue LT Std 75 Bold.otf")
          format("opentype");
        font-weight: bold;
        font-style: normal;
      }

      .receipt-tear {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 10px,
          white 11px
        );
        background-size: 20px 20px;
        background-repeat: repeat-x;
        height: 10px;
        width: 100%;
      }

      /* Custom Slider */
      .custom-slider::-webkit-slider-thumb {
        appearance: none;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: black;
        cursor: pointer;
      }
      .custom-slider::-moz-range-thumb {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: black;
        cursor: pointer;
        border: none;
      }
    </style>
  </head>

  <body
    class="flex flex-col items-center h-[100svh] w-screen overflow-hidden bg-white text-black font-helvetica select-none overflow-x-hidden"
  >
    <!-- ===== HEADER ===== -->
    <header id="mainHeader" class="w-full pt-[6svh] pb-[2svh] flex-shrink-0">
      <div class="flex justify-center items-center">
        <img
          src="./assets/logo.svg"
          alt="Potboy Aru"
          class="h-[4svh] w-auto object-contain"
        />
      </div>
      <hr class="mt-3 border-t-2 border-black" />
    </header>

    <!-- ===== NO PARAMS HEADER ===== -->
    <div
      id="noParamsHeader"
      class="w-full pt-[12svh] flex-shrink-0 flex font-thin flex-col items-center gap-[4svh] font-bold text-lg hidden max-w-[80svw] mx-auto text-center"
      style="letter-spacing: 0.3em"
    >
      <div>C O M E</div>
      <div>H U N G R Y</div>
      <div class="tracking-widest">&lt; 3 &nbsp; &lt; 3</div>
    </div>

    <!-- html2canvas for receipt printing -->
    <script src="/assets/html2canvas.min.js"></script>

    <!-- ===== CONTENT ===== -->
    <main
      class="flex flex-col flex-1 items-center justify-start w-full max-w-[90svw] relative overflow-hidden"
    >
      <!-- Default Character Images (slideshow) -->
      <div
        id="imageContainer"
        class="h-[55svh] flex flex-col items-center justify-start pt-[10svh] transition-all"
      >
        <img
          src="./assets/image-1.png"
          alt="Potboy"
          class="slideshow-img max-w-[80svw] object-contain"
          style="max-height: 25svh"
        />
        <img
          src="./assets/image-2.png"
          alt="Potboy"
          class="slideshow-img w-[80svw] max-w-[80svw] object-contain hidden"
          style="max-height: 45svh"
        />
        <img
          src="./assets/image-3.png"
          alt="Potboy"
          class="slideshow-img w-[80svw] max-w-[80svw] object-contain hidden"
          style="max-height: 45svh"
        />
        <img
          src="./assets/image-4.png"
          alt="Potboy"
          class="slideshow-img w-[80svw] max-w-[80svw] object-contain hidden"
          style="max-height: 45svh"
        />
        <img
          src="./assets/image-5.png"
          alt="Potboy"
          class="slideshow-img w-[80svw] max-w-[80svw] object-contain hidden"
          style="max-height: 8svh"
        />
        <img
          id="defaultAsset"
          src="./assets/default-asset.png"
          alt="Potboy Default"
          class="w-[50svw] max-h-[40svh] mt-[10svh] object-contain hidden"
        />
      </div>

      <!-- Video Container (Browser Camera) -->
      <div
        id="videoContainer"
        class="max-w-[90svw] max-h-[60svh] aspect-[2/3] border border-black border-[.2svh] overflow-hidden relative hidden mt-[4svh]"
      >
        <video
          id="cameraVideo"
          class="w-full h-full object-cover"
          autoplay
          playsinline
          muted
        ></video>
        <div
          id="countdown"
          class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[8rem] text-white font-bold drop-shadow-md hidden pointer-events-none z-10 transition-opacity"
        >
          3
        </div>
        <!-- Processing Overlay -->
        <div
          id="processingOverlay"
          class="absolute inset-0 bg-black/80 flex items-center justify-center z-20 hidden"
        >
          <span class="text-white text-2xl font-bold animate-pulse"
            >Processing image...</span
          >
        </div>
      </div>

      <!-- Retake / Print buttons & Settings -->
      <div
        id="settingsAndButtons"
        class="w-full max-w-[95svw] md:max-w-[420px] px-2 flex-col gap-4 mt-6 pb-4"
      >
        <!-- Settings (shown after capture) -->
        <div id="thresholdControl" class="hidden w-full flex-col">
          <label class="block text-sm font-bold mb-1 tracking-wide"
            >SETTINGS</label
          >

          <!-- Mode Selector -->
          <div class="flex gap-4 items-center mb-6">
            <button
              id="modeStencil"
              class="text-sm font-bold text-black border border-black px-2 py-0.5 uppercase tracking-wide"
            >
              STENCIL
            </button>
            <button id="modeGrayscale" class="text-sm font-bold text-gray-300">
              GRAYSCALE
            </button>
            <button id="modeWinner" class="text-sm font-bold text-gray-300">
              WINNER
            </button>
          </div>

          <label
            for="thresholdSlider"
            class="block text-sm font-bold mb-1 tracking-wide"
            >DARKNESS THRESHOLD</label
          >
          <div class="relative w-full h-[2px] bg-black mb-6 flex items-center">
            <input
              type="range"
              id="thresholdSlider"
              min="0"
              max="200"
              value="100"
              class="absolute w-full appearance-none bg-transparent m-0 cursor-pointer z-10 h-6 custom-slider"
            />
          </div>
        </div>

        <div id="btnRow" class="hidden w-full flex-col gap-3 mb-6">
          <button
            id="btnPrint"
            class="w-full border-2 border-black bg-white text-black font-bold h-[5svh] flex items-center justify-center transition-transform active:scale-95 disabled:opacity-50 tracking-widest uppercase"
          >
            PRINT
          </button>
          <button
            id="btnDownload"
            class="w-full border-2 border-black bg-white text-black font-bold h-[5svh] flex items-center justify-center transition-transform active:scale-95 tracking-widest uppercase"
          >
            DOWNLOAD
          </button>
          <button
            id="btnRetake"
            class="w-full bg-[#1b1a1c] text-white border-none font-bold h-[5svh] flex items-center justify-center transition-transform active:scale-95 disabled:opacity-50 tracking-widest uppercase"
          >
            RETAKE
          </button>
        </div>
      </div>

      <!-- Thank you message (shown after print) -->
      <div
        id="thankYouMsg"
        class="hidden text-center font-averia text-2xl font-bold text-black mb-4"
      >
        Thank you for coming!
      </div>

      <!-- Receipt Container (original - plain mode) -->
      <div
        id="receiptContainer"
        class="hidden w-full max-w-[80svw] md:max-w-[420px] relative border-[2px] mb-[3svh] border-black"
      >
        <canvas
          id="receiptCanvas"
          class="w-full h-auto aspect-[2/3] object-cover block"
        ></canvas>
      </div>

      <!-- Stencil Template Container -->
      <div
        id="stencilTemplateContainer"
        class="hidden w-full max-w-[80svw] md:max-w-[420px] relative mb-[3svh]"
      >
        <canvas
          id="stencilTemplateCanvas"
          class="w-full h-auto block"
          style="aspect-ratio: 944 / 1535"
        ></canvas>
      </div>

      <!-- Grayscale Template Container -->
      <div
        id="grayscaleTemplateContainer"
        class="hidden w-full max-w-[80svw] md:max-w-[420px] relative mb-[3svh]"
      >
        <canvas
          id="grayscaleTemplateCanvas"
          class="w-full h-auto block"
          style="aspect-ratio: 944 / 1535"
        ></canvas>
      </div>

      <!-- Winner Template Container -->
      <div
        id="winnerTemplateContainer"
        class="hidden w-full max-w-[80svw] md:max-w-[420px] relative mb-[3svh]"
      >
        <canvas
          id="winnerTemplateCanvas"
          class="w-full h-auto block"
          style="aspect-ratio: 944 / 1535"
        ></canvas>
      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer
      id="mainFooter"
      class="w-full px-6 pb-[3svh] pt-3 flex-shrink-0 flex flex-col items-center gap-3"
    >
      <!-- Controls -->
      <div
        id="controlsBlock"
        class="w-full flex flex-col items-center gap-[2svh] z-30"
      >
        <!-- Start Button -->
        <button
          id="btnStart"
          class="flex bg-black font text-white border-none text-[3svh] cursor-pointer hover:bg-neutral-800 w-full max-w-[90svw] md:max-w-[30svw] py-[.5svh] items-center justify-center transition-transform active:scale-95 tracking-widest uppercase"
        >
          START
        </button>

        <!-- Capture -->
        <button
          id="btnCapture"
          class="hidden bg-black font text-white border-none text-[3svh] cursor-pointer hover:bg-neutral-800 w-full max-w-[90svw] md:max-w-[30svw] py-[.5svh] items-center justify-center transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed tracking-widest uppercase"
        >
          CAPTURE
        </button>
        <div
          id="captureHint"
          class="hidden text-black font-bold animate-pulse text-lg"
        >
          CHEESE!
        </div>
      </div>

      <!-- RSVP Info -->
      <div
        id="footerInfo"
        class="text-right w-[90svw] mt-[5svh] text-[3.4svw] font-bold leading-snug"
      >
        <div class="text-[2.5svw]">
          RSVP <span class="text-[2svw]">0889-0992-9999</span>
        </div>
        <div class="font-medium">
          Pot Boy Aru, Row 9, Jl. Bulungan No.9, Kramat Pela
        </div>
      </div>
    </footer>

    <script>
      // State elements
      const imageContainer = document.getElementById("imageContainer");
      const slideshowImgs = document.querySelectorAll(".slideshow-img");
      const videoContainer = document.getElementById("videoContainer");
      const cameraVideo = document.getElementById("cameraVideo");
      const receiptCanvas = document.getElementById("receiptCanvas");
      const countdownEl = document.getElementById("countdown");
      const processingOverlay = document.getElementById("processingOverlay");
      const receiptContainer = document.getElementById("receiptContainer");
      const mainHeader = document.getElementById("mainHeader");
      const noParamsHeader = document.getElementById("noParamsHeader");
      const controlsBlock = document.getElementById("controlsBlock");

      const btnStart = document.getElementById("btnStart");
      const btnCapture = document.getElementById("btnCapture");
      const captureHint = document.getElementById("captureHint");
      const btnPrint = document.getElementById("btnPrint");
      const btnDownload = document.getElementById("btnDownload");
      const btnRetake = document.getElementById("btnRetake");
      const btnRow = document.getElementById("btnRow");
      const thankYouMsg = document.getElementById("thankYouMsg");

      // Check URL Params
      const urlParams = new URLSearchParams(window.location.search);
      const hasCode = urlParams.has("code");

      let ws = null;
      let previewActive = false;
      let originalFrameData = null; // Store raw capture for re-processing
      let currentMode = "stencil"; // 'stencil' or 'grayscale'
      let cameraStream = null; // MediaStream from getUserMedia

      // Image slideshow (toggle visibility every 4s)
      let slideshowIndex = 0;
      let slideshowInterval = null;

      if (!hasCode) {
        // Show "no params" page
        mainHeader.classList.add("hidden");
        noParamsHeader.classList.remove("hidden");
        noParamsHeader.classList.add("flex");
        controlsBlock.classList.add("hidden");

        imageContainer.classList.remove("pt-[10svh]", "h-[55svh]");
        imageContainer.classList.add("flex-1", "w-full", "min-h-0");

        slideshowImgs.forEach((img) => img.classList.add("hidden"));
        document.getElementById("defaultAsset").classList.remove("hidden");
      } else {
        slideshowInterval = setInterval(() => {
          slideshowImgs[slideshowIndex].classList.add("hidden");
          slideshowIndex = (slideshowIndex + 1) % slideshowImgs.length;
          slideshowImgs[slideshowIndex].classList.remove("hidden");
        }, 4000);
      }

      // WebSocket Setup
      function connectWS() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          handleWSMessage(data);
        };

        ws.onclose = () => {
          console.log("WS closed, reconnecting...");
          setTimeout(connectWS, 2000);
        };
      }
      connectWS();


      function handleWSMessage(data) {
        console.log("WS Data:", data);
        switch (data.type) {
          case "countdown":
            updateCountdown(data.value);
            break;
          case "capture_start":
            showProcessing();
            break;
          case "capture_done":
            processAndShowReceipt();
            break;
        }
      }

      // Step 1: Submit Code
      // Start -> Preview
      btnStart.addEventListener("click", async () => {
        btnStart.disabled = true;
        btnStart.textContent = "STARTING...";
        clearInterval(slideshowInterval);

        try {
          // Use browser camera directly via getUserMedia
          console.log("[CAMERA] Requesting camera access...");
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
            audio: false,
          });
          console.log("[CAMERA] Got stream, assigning to video element...");
          cameraVideo.srcObject = cameraStream;

          // Wait for the video to actually start playing
          await cameraVideo.play();
          console.log("[CAMERA] Video playing, transitioning UI...");

          btnStart.classList.add("hidden");
          btnStart.classList.remove("flex");
          imageContainer.classList.add("hidden");

          videoContainer.classList.remove("hidden");
          videoContainer.classList.add("flex");

          btnCapture.classList.remove("hidden");
          btnCapture.classList.add("flex");
          previewActive = true;
          console.log("[CAMERA] Preview active!");
        } catch (e) {
          console.error("[CAMERA] Error:", e);
          alert("Could not access camera: " + e.message);
        }
        btnStart.textContent = "Start";
        btnStart.disabled = false;
      });

      // Step 3: Capture with frontend countdown
      btnCapture.addEventListener("click", () => {
        btnCapture.disabled = true;
        btnCapture.textContent = "CAPTURING...";

        // Run countdown in browser
        let count = 3;
        countdownEl.textContent = count;
        countdownEl.classList.remove("hidden");
        countdownEl.classList.add("block");

        const interval = setInterval(async () => {
          count--;
          if (count > 0) {
            countdownEl.textContent = count;
          } else {
            clearInterval(interval);
            countdownEl.classList.add("hidden");
            countdownEl.classList.remove("block");

            // Show processing overlay
            processingOverlay.classList.remove("hidden");

            // Capture frame directly from browser video
            processAndShowReceipt();
          }
        }, 1000);
      });

      function showProcessing() {
        processingOverlay.classList.remove("hidden");
      }

      function processAndShowReceipt() {
        // 1. Capture the visible 2:3 crop from the camera video
        // The container is 2:3 with object-cover, so we need to
        // calculate which portion of the native video is visible.
        const videoW = cameraVideo.videoWidth;
        const videoH = cameraVideo.videoHeight;
        const targetRatio = 2 / 3; // container aspect ratio

        let sx, sy, sw, sh;
        const videoRatio = videoW / videoH;

        if (videoRatio > targetRatio) {
          // Video is wider than container — crop sides
          sh = videoH;
          sw = videoH * targetRatio;
          sx = (videoW - sw) / 2;
          sy = 0;
        } else {
          // Video is taller — crop top/bottom
          sw = videoW;
          sh = videoW / targetRatio;
          sx = 0;
          sy = (videoH - sh) / 2;
        }

        // Output canvas at 2:3 ratio
        const outW = 400;
        const outH = 600;
        receiptCanvas.width = outW;
        receiptCanvas.height = outH;
        const ctx = receiptCanvas.getContext("2d");
        const w = receiptCanvas.width;
        const h = receiptCanvas.height;

        ctx.drawImage(cameraVideo, sx, sy, sw, sh, 0, 0, outW, outH);

        // Stop the camera stream after capture
        stopCamera();

        // Store original pixels so we can re-threshold without losing detail
        originalFrameData = ctx.getImageData(0, 0, w, h);

        // Initial render
        applyFilters();

        // 2. Clear UI
        videoContainer.classList.add("hidden");
        btnCapture.classList.add("hidden");

        // Show the correct template container based on current mode
        receiptContainer.classList.add("hidden");
        receiptContainer.classList.remove("flex");
        stencilTemplateContainer.classList.add("hidden");
        grayscaleTemplateContainer.classList.add("hidden");
        winnerTemplateContainer.classList.add("hidden");

        if (currentMode === "stencil") {
          stencilTemplateContainer.classList.remove("hidden");
        } else if (currentMode === "grayscale") {
          grayscaleTemplateContainer.classList.remove("hidden");
        } else if (currentMode === "winner") {
          winnerTemplateContainer.classList.remove("hidden");
        }
        btnRow.classList.remove("hidden");
        btnRow.classList.add("flex");
        document.getElementById("thresholdControl").classList.remove("hidden");
        document.getElementById("thresholdControl").classList.add("flex");
        processingOverlay.classList.add("hidden");

        const mainFooter = document.getElementById("mainFooter");
        mainFooter.classList.add("hidden");

        // Make page scrollable so receipt is fully visible
        document.body.classList.remove("overflow-hidden", "h-[100svh]");
        document.body.classList.add(
          "overflow-y-auto",
          "min-h-[100svh]",
          "h-auto",
        );
      }

      const thresholdSlider = document.getElementById("thresholdSlider");

      const modeStencil = document.getElementById("modeStencil");
      const modeGrayscale = document.getElementById("modeGrayscale");
      const modeWinner = document.getElementById("modeWinner");

      // Template containers
      const stencilTemplateContainer = document.getElementById(
        "stencilTemplateContainer",
      );
      const grayscaleTemplateContainer = document.getElementById(
        "grayscaleTemplateContainer",
      );
      const winnerTemplateContainer = document.getElementById(
        "winnerTemplateContainer",
      );

      // Template canvases
      const stencilTemplateCanvas = document.getElementById(
        "stencilTemplateCanvas",
      );
      const grayscaleTemplateCanvas = document.getElementById(
        "grayscaleTemplateCanvas",
      );
      const winnerTemplateCanvas = document.getElementById(
        "winnerTemplateCanvas",
      );

      // Preload template images
      const templateImages = {};
      function preloadTemplateImage(name) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            templateImages[name] = img;
            resolve();
          };
          img.src = `./assets/${name}.png`;
        });
      }
      Promise.all([
        preloadTemplateImage("stencil"),
        preloadTemplateImage("grayscale"),
        preloadTemplateImage("winner"),
      ]);

      // Photo placement regions (pixel coords on 944x1535 template)
      // These define where the photo placeholder sits on each template
      const templatePhotoRegions = {
        stencil: { x: 60, y: 339, w: 824, h: 859 },
        grayscale: { x: 0, y: 0, w: 762, h: 1534 },
        winner: { x: 69, y: 436, w: 809, h: 432 },
      };

      modeStencil.addEventListener("click", () => setMode("stencil"));
      modeGrayscale.addEventListener("click", () => setMode("grayscale"));
      modeWinner.addEventListener("click", () => setMode("winner"));

      function setMode(mode) {
        currentMode = mode;
        const allModeButtons = [modeStencil, modeGrayscale, modeWinner];
        const activeClasses = [
          "text-black",
          "border",
          "border-black",
          "px-2",
          "py-0.5",
        ];

        // Reset all buttons
        allModeButtons.forEach((btn) => {
          btn.classList.remove(...activeClasses);
          btn.classList.add("text-gray-300");
        });

        // Activate selected button
        const activeBtn =
          mode === "stencil"
            ? modeStencil
            : mode === "grayscale"
              ? modeGrayscale
              : modeWinner;
        activeBtn.classList.add(...activeClasses);
        activeBtn.classList.remove("text-gray-300");

        // Set slider ranges per mode
        if (mode === "stencil" || mode === "winner") {
          thresholdSlider.min = 0;
          thresholdSlider.max = 200;
          thresholdSlider.value = 100;
        } else {
          thresholdSlider.min = -160;
          thresholdSlider.max = 0;
          thresholdSlider.value = -80;
        }

        // Show/hide the correct containers
        receiptContainer.classList.add("hidden");
        receiptContainer.classList.remove("flex");
        stencilTemplateContainer.classList.add("hidden");
        grayscaleTemplateContainer.classList.add("hidden");
        winnerTemplateContainer.classList.add("hidden");

        if (mode === "stencil") {
          stencilTemplateContainer.classList.remove("hidden");
        } else if (mode === "grayscale") {
          grayscaleTemplateContainer.classList.remove("hidden");
        } else if (mode === "winner") {
          winnerTemplateContainer.classList.remove("hidden");
        }

        applyFilters();
      }

      thresholdSlider.addEventListener("input", (e) => {
        applyFilters();
      });

      function applyStencilFilter(srcData, w, h, sliderVal) {
        let imageData = new ImageData(
          new Uint8ClampedArray(srcData.data),
          srcData.width,
          srcData.height,
        );
        let data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i],
            g = data[i + 1],
            b = data[i + 2],
            a = data[i + 3];
          if (a === 0) {
            data[i] = 255;
            data[i + 1] = 255;
            data[i + 2] = 255;
            data[i + 3] = 255;
            continue;
          }
          let gray = 0.299 * r + 0.587 * g + 0.114 * b;
          let finalVal = gray < sliderVal ? 0 : 255;
          data[i] = finalVal;
          data[i + 1] = finalVal;
          data[i + 2] = finalVal;
          data[i + 3] = 255;
        }
        return imageData;
      }

      function applyGrayscaleFilter(srcData, w, h, sliderVal) {
        let imageData = new ImageData(
          new Uint8ClampedArray(srcData.data),
          srcData.width,
          srcData.height,
        );
        let data = imageData.data;

        const bayerMatrix8x8 = [
          [0, 48, 12, 60, 3, 51, 15, 63],
          [32, 16, 44, 28, 35, 19, 47, 31],
          [8, 56, 4, 52, 11, 59, 7, 55],
          [40, 24, 36, 20, 43, 27, 39, 23],
          [2, 50, 14, 62, 1, 49, 13, 61],
          [34, 18, 46, 30, 33, 17, 45, 29],
          [10, 58, 6, 54, 9, 57, 5, 53],
          [42, 26, 38, 22, 41, 25, 37, 21],
        ].map((row) => row.map((v) => v * 4));

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i],
            g = data[i + 1],
            b = data[i + 2],
            a = data[i + 3];
          if (a === 0) {
            data[i] = 255;
            data[i + 1] = 255;
            data[i + 2] = 255;
            data[i + 3] = 255;
            continue;
          }
          let gray = 0.299 * r + 0.587 * g + 0.114 * b;
          let adjustedGray = Math.min(255, Math.max(0, gray + sliderVal));
          const pixelIndex = i / 4;
          const x = pixelIndex % w;
          const y = Math.floor(pixelIndex / w);
          const threshold = bayerMatrix8x8[y % 8][x % 8];
          let finalVal = adjustedGray > threshold ? 255 : 0;
          data[i] = finalVal;
          data[i + 1] = finalVal;
          data[i + 2] = finalVal;
          data[i + 3] = 255;
        }
        return imageData;
      }

      function applyFilters() {
        if (!originalFrameData) return;

        const sliderVal = parseInt(thresholdSlider.value);
        const w = originalFrameData.width;
        const h = originalFrameData.height;

        // Determine which filter to apply based on mode
        let filterMode = currentMode;
        // Winner uses stencil filter
        if (filterMode === "winner") filterMode = "stencil";

        let processedImageData;
        if (filterMode === "stencil") {
          processedImageData = applyStencilFilter(
            originalFrameData,
            w,
            h,
            sliderVal,
          );
        } else {
          processedImageData = applyGrayscaleFilter(
            originalFrameData,
            w,
            h,
            sliderVal,
          );
        }

        // Render to the plain receipt canvas (always update for print)
        const ctx = receiptCanvas.getContext("2d");
        receiptCanvas.width = w;
        receiptCanvas.height = h;
        ctx.putImageData(processedImageData, 0, 0);

        // Render to the corresponding template canvas
        renderTemplateComposite(currentMode, processedImageData);
      }

      function renderTemplateComposite(mode, processedImageData) {
        const templateImg = templateImages[mode];
        if (!templateImg) return;

        const canvasMap = {
          stencil: stencilTemplateCanvas,
          grayscale: grayscaleTemplateCanvas,
          winner: winnerTemplateCanvas,
        };
        const canvas = canvasMap[mode];
        if (!canvas) return;

        const TW = templateImg.naturalWidth; // 944
        const TH = templateImg.naturalHeight; // 1535
        canvas.width = TW;
        canvas.height = TH;
        const ctx = canvas.getContext("2d");

        // Clear canvas
        ctx.clearRect(0, 0, TW, TH);

        // Get the photo region for this template
        const region = templatePhotoRegions[mode];

        // Create a temporary canvas with the processed photo
        const tmpCanvas = document.createElement("canvas");
        tmpCanvas.width = processedImageData.width;
        tmpCanvas.height = processedImageData.height;
        tmpCanvas.getContext("2d").putImageData(processedImageData, 0, 0);

        // Draw photo into the placeholder region (object-cover style)
        const photoW = processedImageData.width;
        const photoH = processedImageData.height;
        const regionRatio = region.w / region.h;
        const photoRatio = photoW / photoH;

        let sx = 0,
          sy = 0,
          sw = photoW,
          sh = photoH;
        if (photoRatio > regionRatio) {
          // Photo is wider — crop sides
          sw = photoH * regionRatio;
          sx = (photoW - sw) / 2;
        } else {
          // Photo is taller — crop top/bottom
          sh = photoW / regionRatio;
          sy = (photoH - sh) / 2;
        }

        // Draw the template image first (as background)
        ctx.drawImage(templateImg, 0, 0, TW, TH);

        // Draw the photo on top into the placeholder region
        ctx.drawImage(
          tmpCanvas,
          sx,
          sy,
          sw,
          sh,
          region.x,
          region.y,
          region.w,
          region.h,
        );

        // Draw timestamps
        const now = new Date();
        const days = ["sun", "mon", "tue", "wed", "thu", "fri", "sat"];
        const fullDays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const months = ["january", "february", "march", "april", "may", "june", "july", "august", "september", "october", "november", "december"];
        const fullMonths = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const dayName = days[now.getDay()];
        const fullDayName = fullDays[now.getDay()];
        const monthName = months[now.getMonth()];
        const fullMonthName = fullMonths[now.getMonth()];
        const dateNum = now.getDate();
        const year = now.getFullYear();
        const hours = now.getHours().toString().padStart(2, "0");
        const mins = now.getMinutes().toString().padStart(2, "0");
        const timeStr = `${hours}.${mins}`;

        if (mode === "grayscale") {
          // Top-left of photo area: "Date: Wednesday, 4 March 2026 // Hours: 13.12"
          const tx = region.x + 28;
          const ty = region.y + 56;

          ctx.fillStyle = "white";
          ctx.textBaseline = "alphabetic";

          // "Date: " (small)
          const labelDate = "Date: ";
          ctx.font = "bold 22px 'Helvetica Neue', Helvetica, Arial, sans-serif";
          let cx = tx;
          ctx.fillText(labelDate, cx, ty);
          cx += ctx.measureText(labelDate).width;

          // "Wednesday, 4 March 2026" (larger)
          const dateText = `${fullDayName}, ${dateNum} ${fullMonthName} ${year}`;
          ctx.font = "bold 34px 'Helvetica Neue', Helvetica, Arial, sans-serif";
          ctx.fillText(dateText, cx, ty);
          cx += ctx.measureText(dateText).width;

          // " // " separator
          const sep = " // ";
          ctx.font = "bold 34px 'Helvetica Neue', Helvetica, Arial, sans-serif";
          ctx.fillText(sep, cx, ty);
          cx += ctx.measureText(sep).width;

          // "Hours: " (small)
          const labelHours = "Hours: ";
          ctx.font = "bold 22px 'Helvetica Neue', Helvetica, Arial, sans-serif";
          ctx.fillText(labelHours, cx, ty);
          cx += ctx.measureText(labelHours).width;

          // "13.12" (larger)
          ctx.font = "bold 34px 'Helvetica Neue', Helvetica, Arial, sans-serif";
          ctx.fillText(timeStr, cx, ty);

        } else if (mode === "winner") {
          // Top-left & top-right of the FULL canvas bg
          const pad = 40;
          const boxH = 44;
          const dateText = `date: ${dayName}, ${dateNum} ${monthName} ${year}`;
          const timeText = `time: ${timeStr}`;

          ctx.font = "bold 28px 'Helvetica Neue', Helvetica, Arial, sans-serif";
          ctx.textBaseline = "middle";

          // --- Date box (top-left) ---
          const dm = ctx.measureText(dateText);
          const dBoxW = dm.width + 24;
          const dBoxX = pad;
          const dBoxY = pad;
          ctx.fillStyle = "black";
          ctx.fillRect(dBoxX, dBoxY, dBoxW, boxH);
          ctx.strokeStyle = "white";
          ctx.lineWidth = 2;
          ctx.strokeRect(dBoxX, dBoxY, dBoxW, boxH);
          ctx.fillStyle = "white";
          ctx.fillText(dateText, dBoxX + 12, dBoxY + boxH / 2);

          // --- Time box (top-right) ---
          const tm = ctx.measureText(timeText);
          const tBoxW = tm.width + 24;
          const tBoxX = TW - tBoxW - pad;
          const tBoxY = pad;
          ctx.fillStyle = "black";
          ctx.fillRect(tBoxX, tBoxY, tBoxW, boxH);
          ctx.strokeStyle = "white";
          ctx.lineWidth = 2;
          ctx.strokeRect(tBoxX, tBoxY, tBoxW, boxH);
          ctx.fillStyle = "white";
          ctx.fillText(timeText, tBoxX + 12, tBoxY + boxH / 2);

        } else if (mode === "stencil") {
          // Below the photo: date bottom-left, time bottom-right
          const belowY = region.y + region.h + 36;
          const dateText = `date: ${dayName}, ${dateNum} ${monthName} ${year}`;
          const timeText = `time: ${timeStr}`;

          ctx.font = "400 28px 'Helvetica Neue', Helvetica, Arial, sans-serif";
          ctx.fillStyle = "black";
          ctx.textBaseline = "alphabetic";

          // Bottom-left
          ctx.fillText(dateText, region.x, belowY);

          // Bottom-right
          const tm = ctx.measureText(timeText);
          ctx.fillText(timeText, region.x + region.w - tm.width, belowY);
        }
      }

      // Helper to stop camera stream
      function stopCamera() {
        if (cameraStream) {
          cameraStream.getTracks().forEach((track) => track.stop());
          cameraStream = null;
        }
        cameraVideo.srcObject = null;
      }

      // Retake — go back to camera capture
      btnRetake.addEventListener("click", async () => {
        // Show main footer
        const mainFooter = document.getElementById("mainFooter");
        mainFooter.classList.remove("hidden");

        // Hide receipt and all template containers and buttons
        receiptContainer.classList.add("hidden");
        receiptContainer.classList.remove("flex");
        stencilTemplateContainer.classList.add("hidden");
        grayscaleTemplateContainer.classList.add("hidden");
        winnerTemplateContainer.classList.add("hidden");
        btnRow.classList.add("hidden");
        document.getElementById("thresholdControl").classList.add("hidden");
        thankYouMsg.classList.add("hidden");

        // Reset body scroll
        document.body.classList.add("overflow-hidden", "h-[100svh]");
        document.body.classList.remove(
          "overflow-y-auto",
          "min-h-[100svh]",
          "h-auto",
        );

        // Show video and capture button
        videoContainer.classList.remove("hidden");
        btnCapture.classList.remove("hidden");
        btnCapture.classList.add("flex");
        btnCapture.disabled = false;
        btnCapture.textContent = "Capture";

        // Restart browser camera
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
            audio: false,
          });
          cameraVideo.srcObject = cameraStream;
        } catch (e) {
          console.error("Camera restart error:", e);
          alert("Could not access camera: " + e.message);
        }
      });

      // Download image
      btnDownload.addEventListener("click", () => {
        let printCanvas = receiptCanvas;
        if (currentMode === "stencil") printCanvas = stencilTemplateCanvas;
        else if (currentMode === "grayscale") printCanvas = grayscaleTemplateCanvas;
        else if (currentMode === "winner") printCanvas = winnerTemplateCanvas;

        const link = document.createElement("a");
        link.download = `potboy-${currentMode}.png`;
        link.href = printCanvas.toDataURL("image/png");
        link.click();
      });

      // Print receipt
      btnPrint.addEventListener("click", async () => {
        console.log("[PRINT] Button clicked");
        btnPrint.disabled = true;
        btnPrint.textContent = "Printing...";
        if (ws && ws.readyState === 1)
          ws.send(
            JSON.stringify({ type: "log", msg: "[PRINT] Button clicked" }),
          );

        try {
          // Use the active template canvas for printing
          let printCanvas = receiptCanvas;
          if (currentMode === "stencil") printCanvas = stencilTemplateCanvas;
          else if (currentMode === "grayscale")
            printCanvas = grayscaleTemplateCanvas;
          else if (currentMode === "winner") printCanvas = winnerTemplateCanvas;
          const dataUrl = printCanvas.toDataURL("image/png");

          console.log("[PRINT] Sending to server, size:", dataUrl.length);
          if (ws && ws.readyState === 1)
            ws.send(
              JSON.stringify({
                type: "log",
                msg: "[PRINT] Sending to server, size: " + dataUrl.length,
              }),
            );
          const response = await fetch("/api/print", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: dataUrl }),
          });
          console.log("[PRINT] Response:", response.status);
          const result = await response.json();

          if (result.success) {
            btnRow.classList.add("hidden");
            document.getElementById("thresholdControl").classList.add("hidden");
            thankYouMsg.classList.remove("hidden");
          } else {
            btnPrint.textContent = "Print Failed";
            btnPrint.disabled = false;
            alert("Print error: " + result.error);
          }
        } catch (e) {
          console.error("[PRINT] Error:", e);
          btnPrint.textContent = "Print Failed";
          btnPrint.disabled = false;
          alert("Error: " + e.message);
        }
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Potboy Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#e74c3c",
              "primary-dark": "#c0392b",
            },
            fontFamily: {
              averia: ['"Averia Serif Libre"', "serif"],
              helvetica: [
                '"Helvetica Neue"',
                "Helvetica",
                "Arial",
                "sans-serif",
              ],
              receipt: ['"Courier New"', "Courier", "monospace"],
            },
            backgroundImage: {
              "dashed-line":
                "url(\"data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='0' ry='0' stroke='black' stroke-width='2' stroke-dasharray='10%2c 10' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e\")",
            },
          },
        },
      };
    </script>
    <style>
      @font-face {
        font-family: "Averia Serif Libre";
        src: url("./assets/fonts/AveriaSerifLibre-Regular.ttf")
          format("truetype");
        font-weight: normal;
        font-style: normal;
      }

      @font-face {
        font-family: "Averia Serif Libre";
        src: url("./assets/fonts/AveriaSerifLibre-Bold.ttf") format("truetype");
        font-weight: bold;
        font-style: normal;
      }

      @font-face {
        font-family: "Helvetica Neue";
        src: url("./assets/fonts/Helvetica Neue LT Std 65 Medium.otf")
          format("opentype");
        font-weight: 500;
        font-style: normal;
      }

      @font-face {
        font-family: "Helvetica Neue";
        src: url("./assets/fonts/Helvetica Neue LT Std 75 Bold.otf")
          format("opentype");
        font-weight: bold;
        font-style: normal;
      }

      .receipt-tear {
        background-image: radial-gradient(
          circle at 10px 0,
          transparent 10px,
          white 11px
        );
        background-size: 20px 20px;
        background-repeat: repeat-x;
        height: 10px;
        width: 100%;
      }

      /* Custom Slider */
      .custom-slider::-webkit-slider-thumb {
        appearance: none;
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: black;
        cursor: pointer;
      }
      .custom-slider::-moz-range-thumb {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        background: black;
        cursor: pointer;
        border: none;
      }
    </style>
  </head>

  <body
    class="flex flex-col items-center h-[100svh] w-screen overflow-hidden bg-white text-black font-helvetica select-none overflow-x-hidden"
  >
    <!-- ===== HEADER ===== -->
    <header id="mainHeader" class="w-full pt-[6svh] pb-[2svh] flex-shrink-0">
      <div class="flex justify-center items-center">
        <img
          src="./assets/logo.svg"
          alt="Potboy Aru"
          class="h-[4svh] w-auto object-contain"
        />
      </div>
      <hr class="mt-3 border-t-2 border-black" />
    </header>

    <!-- html2canvas for receipt printing -->
    <script src="/assets/html2canvas.min.js"></script>

    <!-- ===== CONTENT ===== -->
    <main
      class="flex-1 flex flex-col items-center justify-start w-full max-w-[90svw] relative overflow-hidden"
    >
      <!-- Default Character Images (slideshow) -->
      <div id="imageContainer" class="h-[55svh] flex justify-center pt-[10svh]">
        <img
          src="./assets/image-1.png"
          alt="Potboy"
          class="slideshow-img max-w-[80svw] object-contain"
          style="max-height: 25svh"
        />
        <img
          src="./assets/image-2.png"
          alt="Potboy"
          class="slideshow-img max-w-[80svw] object-contain hidden"
          style="max-height: 45svh"
        />
        <img
          src="./assets/image-3.png"
          alt="Potboy"
          class="slideshow-img max-w-[80svw] object-contain hidden"
          style="max-height: 45svh"
        />
        <img
          src="./assets/image-4.png"
          alt="Potboy"
          class="slideshow-img max-w-[80svw] object-contain hidden"
          style="max-height: 45svh"
        />
        <img
          src="./assets/image-5.png"
          alt="Potboy"
          class="slideshow-img max-w-[80svw] object-contain hidden"
          style="max-height: 8svh"
        />
      </div>

      <!-- Video Container (Browser Camera) -->
      <div
        id="videoContainer"
        class="max-w-[90svw] max-h-[60svh] aspect-[2/3] border border-black border-[.2svh] overflow-hidden relative hidden mt-[4svh]"
      >
        <video
          id="cameraVideo"
          class="w-full h-full object-cover"
          autoplay
          playsinline
          muted
        ></video>
        <div
          id="countdown"
          class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[8rem] text-white font-bold drop-shadow-md hidden pointer-events-none z-10 transition-opacity"
        >
          3
        </div>
        <!-- Processing Overlay -->
        <div
          id="processingOverlay"
          class="absolute inset-0 bg-black/80 flex items-center justify-center z-20 hidden"
        >
          <span class="text-white text-2xl font-bold animate-pulse"
            >Processing image...</span
          >
        </div>
      </div>

      <!-- Retake / Print buttons & Settings -->
      <div
        id="settingsAndButtons"
        class="w-full max-w-[95svw] md:max-w-[420px] px-2 flex-col gap-4 mt-6 pb-4"
      >
        <!-- Settings (shown after capture) -->
        <div id="thresholdControl" class="hidden w-full flex-col">
          <label class="block text-sm font-bold mb-1 tracking-wide"
            >SETTINGS</label
          >

          <!-- Mode Selector -->
          <div class="flex gap-4 items-center mb-6">
            <button
              id="modeStencil"
              class="text-sm font-bold text-black border border-black px-2 py-0.5 uppercase tracking-wide"
            >
              STENCIL
            </button>
            <button id="modeGrayscale" class="text-sm font-bold text-gray-300">
              GRAYSCALE
            </button>
          </div>

          <label
            for="thresholdSlider"
            class="block text-sm font-bold mb-1 tracking-wide"
            >DARKNESS THRESHOLD</label
          >
          <div class="relative w-full h-[2px] bg-black mb-6 flex items-center">
            <input
              type="range"
              id="thresholdSlider"
              min="0"
              max="255"
              value="130"
              class="absolute w-full appearance-none bg-transparent m-0 cursor-pointer z-10 h-6 custom-slider"
            />
          </div>
        </div>

        <div id="btnRow" class="hidden w-full flex-col gap-3 mb-6">
          <button
            id="btnPrint"
            class="w-full border-2 border-black bg-white text-black font-bold h-[5svh] flex items-center justify-center transition-transform active:scale-95 disabled:opacity-50 tracking-widest uppercase"
          >
            PRINT
          </button>
          <button
            id="btnRetake"
            class="w-full bg-[#1b1a1c] text-white border-none font-bold h-[5svh] flex items-center justify-center transition-transform active:scale-95 disabled:opacity-50 tracking-widest uppercase"
          >
            RETAKE
          </button>
        </div>
      </div>

      <!-- Thank you message (shown after print) -->
      <div
        id="thankYouMsg"
        class="hidden text-center font-averia text-2xl font-bold text-black mb-4"
      >
        Thank you for coming!
      </div>

      <!-- Receipt Container -->
      <div
        id="receiptContainer"
        class="hidden w-full max-w-[80svw] md:max-w-[420px] relative border-[2px] mb-[3svh] border-black"
      >
        <canvas
          id="receiptCanvas"
          class="w-full h-auto aspect-[2/3] object-cover block"
        ></canvas>
      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer
      id="mainFooter"
      class="w-full px-6 pb-5 pt-3 flex-shrink-0 flex flex-col items-center gap-3"
    >
      <!-- Controls -->
      <div class="w-full flex flex-col items-center gap-[2svh] z-30">
        <!-- Start Button -->
        <button
          id="btnStart"
          class="flex bg-black font text-white border-none text-[3svh] cursor-pointer hover:bg-neutral-800 w-full max-w-[90svw] md:max-w-[30svw] py-[.5svh] items-center justify-center transition-transform active:scale-95 tracking-widest uppercase"
        >
          START
        </button>

        <!-- Capture -->
        <button
          id="btnCapture"
          class="hidden bg-black font text-white border-none text-[3svh] cursor-pointer hover:bg-neutral-800 w-full max-w-[90svw] md:max-w-[30svw] py-[.5svh] items-center justify-center transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed tracking-widest uppercase"
        >
          CAPTURE
        </button>
        <div
          id="captureHint"
          class="hidden text-black font-bold animate-pulse text-lg"
        >
          CHEESE!
        </div>
      </div>

      <!-- RSVP Info -->
      <div
        id="footerInfo"
        class="text-right w-[90svw] mt-[5svh] text-[3.4svw] font-bold leading-snug"
      >
        <div class="text-[2.5svw]">
          RSVP <span class="text-[2svw]">0889-0992-9999</span>
        </div>
        <div class="font-medium">
          Pot Boy Aru, Row 9, Jl. Bulungan No.9, Kramat Pela
        </div>
      </div>
    </footer>

    <script>
      // State elements
      const imageContainer = document.getElementById("imageContainer");
      const slideshowImgs = document.querySelectorAll(".slideshow-img");
      const videoContainer = document.getElementById("videoContainer");
      const cameraVideo = document.getElementById("cameraVideo");
      const receiptCanvas = document.getElementById("receiptCanvas");
      const countdownEl = document.getElementById("countdown");
      const processingOverlay = document.getElementById("processingOverlay");
      const receiptContainer = document.getElementById("receiptContainer");
      const mainHeader = document.getElementById("mainHeader");

      const btnStart = document.getElementById("btnStart");
      const btnCapture = document.getElementById("btnCapture");
      const captureHint = document.getElementById("captureHint");
      const btnPrint = document.getElementById("btnPrint");
      const btnRetake = document.getElementById("btnRetake");
      const btnRow = document.getElementById("btnRow");
      const thankYouMsg = document.getElementById("thankYouMsg");

      let ws = null;
      let previewActive = false;
      let originalFrameData = null; // Store raw capture for re-processing
      let currentMode = "stencil"; // 'stencil' or 'grayscale'
      let cameraStream = null; // MediaStream from getUserMedia

      // Image slideshow (toggle visibility every 4s)
      let slideshowIndex = 0;
      let slideshowInterval = setInterval(() => {
        slideshowImgs[slideshowIndex].classList.add("hidden");
        slideshowIndex = (slideshowIndex + 1) % slideshowImgs.length;
        slideshowImgs[slideshowIndex].classList.remove("hidden");
      }, 4000);

      // WebSocket Setup
      function connectWS() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          handleWSMessage(data);
        };

        ws.onclose = () => {
          console.log("WS closed, reconnecting...");
          setTimeout(connectWS, 2000);
        };
      }
      connectWS();

      function handleWSMessage(data) {
        console.log("WS Data:", data);
        switch (data.type) {
          case "countdown":
            updateCountdown(data.value);
            break;
          case "capture_start":
            showProcessing();
            break;
          case "capture_done":
            processAndShowReceipt();
            break;
        }
      }

      // Step 1: Submit Code
      // Start -> Preview
      btnStart.addEventListener("click", async () => {
        btnStart.disabled = true;
        btnStart.textContent = "STARTING...";
        clearInterval(slideshowInterval);

        try {
          // Use browser camera directly via getUserMedia
          console.log("[CAMERA] Requesting camera access...");
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
            audio: false,
          });
          console.log("[CAMERA] Got stream, assigning to video element...");
          cameraVideo.srcObject = cameraStream;

          // Wait for the video to actually start playing
          await cameraVideo.play();
          console.log("[CAMERA] Video playing, transitioning UI...");

          btnStart.classList.add("hidden");
          btnStart.classList.remove("flex");
          imageContainer.classList.add("hidden");

          videoContainer.classList.remove("hidden");
          videoContainer.classList.add("flex");

          btnCapture.classList.remove("hidden");
          btnCapture.classList.add("flex");
          previewActive = true;
          console.log("[CAMERA] Preview active!");
        } catch (e) {
          console.error("[CAMERA] Error:", e);
          alert("Could not access camera: " + e.message);
        }
        btnStart.textContent = "Start";
        btnStart.disabled = false;
      });

      // Step 3: Capture with frontend countdown
      btnCapture.addEventListener("click", () => {
        btnCapture.disabled = true;
        btnCapture.textContent = "CAPTURING...";

        // Run countdown in browser
        let count = 3;
        countdownEl.textContent = count;
        countdownEl.classList.remove("hidden");
        countdownEl.classList.add("block");

        const interval = setInterval(async () => {
          count--;
          if (count > 0) {
            countdownEl.textContent = count;
          } else {
            clearInterval(interval);
            countdownEl.classList.add("hidden");
            countdownEl.classList.remove("block");

            // Show processing overlay
            processingOverlay.classList.remove("hidden");

            // Capture frame directly from browser video
            processAndShowReceipt();
          }
        }, 1000);
      });

      function showProcessing() {
        processingOverlay.classList.remove("hidden");
      }

      function processAndShowReceipt() {
        // 1. Capture the visible 2:3 crop from the camera video
        // The container is 2:3 with object-cover, so we need to
        // calculate which portion of the native video is visible.
        const videoW = cameraVideo.videoWidth;
        const videoH = cameraVideo.videoHeight;
        const targetRatio = 2 / 3; // container aspect ratio

        let sx, sy, sw, sh;
        const videoRatio = videoW / videoH;

        if (videoRatio > targetRatio) {
          // Video is wider than container — crop sides
          sh = videoH;
          sw = videoH * targetRatio;
          sx = (videoW - sw) / 2;
          sy = 0;
        } else {
          // Video is taller — crop top/bottom
          sw = videoW;
          sh = videoW / targetRatio;
          sx = 0;
          sy = (videoH - sh) / 2;
        }

        // Output canvas at 2:3 ratio
        const outW = 400;
        const outH = 600;
        receiptCanvas.width = outW;
        receiptCanvas.height = outH;
        const ctx = receiptCanvas.getContext("2d");
        const w = receiptCanvas.width;
        const h = receiptCanvas.height;

        ctx.drawImage(cameraVideo, sx, sy, sw, sh, 0, 0, outW, outH);

        // Stop the camera stream after capture
        stopCamera();

        // Store original pixels so we can re-threshold without losing detail
        originalFrameData = ctx.getImageData(0, 0, w, h);

        // Initial render
        applyFilters();

        // 2. Clear UI
        videoContainer.classList.add("hidden");
        receiptContainer.classList.remove("hidden");
        receiptContainer.classList.add("flex");
        btnCapture.classList.add("hidden");
        btnRow.classList.remove("hidden");
        btnRow.classList.add("flex");
        document.getElementById("thresholdControl").classList.remove("hidden");
        document.getElementById("thresholdControl").classList.add("flex");
        processingOverlay.classList.add("hidden");

        const mainFooter = document.getElementById("mainFooter");
        mainFooter.classList.add("hidden");

        // Make page scrollable so receipt is fully visible
        document.body.classList.remove("overflow-hidden", "h-[100svh]");
        document.body.classList.add(
          "overflow-y-auto",
          "min-h-[100svh]",
          "h-auto",
        );
      }

      const thresholdSlider = document.getElementById("thresholdSlider");

      const modeStencil = document.getElementById("modeStencil");
      const modeGrayscale = document.getElementById("modeGrayscale");

      modeStencil.addEventListener("click", () => setMode("stencil"));
      modeGrayscale.addEventListener("click", () => setMode("grayscale"));

      function setMode(mode) {
        currentMode = mode;
        if (mode === "stencil") {
          modeStencil.classList.add(
            "text-black",
            "border",
            "border-black",
            "px-2",
            "py-0.5",
          );
          modeStencil.classList.remove("text-gray-300");
          modeGrayscale.classList.remove(
            "text-black",
            "border",
            "border-black",
            "px-2",
            "py-0.5",
          );
          modeGrayscale.classList.add("text-gray-300");

          thresholdSlider.min = 0;
          thresholdSlider.max = 255;
          thresholdSlider.value = 130;
        } else {
          modeGrayscale.classList.add(
            "text-black",
            "border",
            "border-black",
            "px-2",
            "py-0.5",
          );
          modeGrayscale.classList.remove("text-gray-300");
          modeStencil.classList.remove(
            "text-black",
            "border",
            "border-black",
            "px-2",
            "py-0.5",
          );
          modeStencil.classList.add("text-gray-300");

          thresholdSlider.min = -150;
          thresholdSlider.max = 150;
          thresholdSlider.value = 0;
        }
        applyFilters();
      }

      thresholdSlider.addEventListener("input", (e) => {
        applyFilters();
      });

      function applyFilters() {
        if (!originalFrameData) return;

        const ctx = receiptCanvas.getContext("2d");
        const w = receiptCanvas.width;
        const h = receiptCanvas.height;
        const sliderVal = parseInt(thresholdSlider.value);

        let imageData = new ImageData(
          new Uint8ClampedArray(originalFrameData.data),
          originalFrameData.width,
          originalFrameData.height,
        );
        let data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const a = data[i + 3];

          // If pixel is fully transparent (alpha=0), treat it as white
          if (a === 0) {
            data[i] = 255;
            data[i + 1] = 255;
            data[i + 2] = 255;
            data[i + 3] = 255;
            continue;
          }

          // Calculate grayscale
          let gray = 0.299 * r + 0.587 * g + 0.114 * b;

          let finalVal;
          if (currentMode === "stencil") {
            // Stencil: Pure black/white based on threshold
            finalVal = gray < sliderVal ? 0 : 255;
          } else {
            // Grayscale: Adjust brightness
            finalVal = Math.min(255, Math.max(0, gray + sliderVal));
          }

          data[i] = finalVal;
          data[i + 1] = finalVal;
          data[i + 2] = finalVal;
          data[i + 3] = 255;
        }

        ctx.putImageData(imageData, 0, 0);
      }

      // Helper to stop camera stream
      function stopCamera() {
        if (cameraStream) {
          cameraStream.getTracks().forEach((track) => track.stop());
          cameraStream = null;
        }
        cameraVideo.srcObject = null;
      }

      // Retake — go back to camera capture
      btnRetake.addEventListener("click", async () => {
        // Show main footer
        const mainFooter = document.getElementById("mainFooter");
        mainFooter.classList.remove("hidden");

        // Hide receipt and buttons
        receiptContainer.classList.add("hidden");
        btnRow.classList.add("hidden");
        document.getElementById("thresholdControl").classList.add("hidden");
        thankYouMsg.classList.add("hidden");

        // Reset body scroll
        document.body.classList.add("overflow-hidden", "h-[100svh]");
        document.body.classList.remove(
          "overflow-y-auto",
          "min-h-[100svh]",
          "h-auto",
        );

        // Show video and capture button
        videoContainer.classList.remove("hidden");
        btnCapture.classList.remove("hidden");
        btnCapture.classList.add("flex");
        btnCapture.disabled = false;
        btnCapture.textContent = "Capture";

        // Restart browser camera
        try {
          cameraStream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
            audio: false,
          });
          cameraVideo.srcObject = cameraStream;
        } catch (e) {
          console.error("Camera restart error:", e);
          alert("Could not access camera: " + e.message);
        }
      });

      // Print receipt
      btnPrint.addEventListener("click", async () => {
        console.log("[PRINT] Button clicked");
        btnPrint.disabled = true;
        btnPrint.textContent = "Printing...";
        if (ws && ws.readyState === 1)
          ws.send(
            JSON.stringify({ type: "log", msg: "[PRINT] Button clicked" }),
          );

        try {
          // Just use the 2:3 canvas as is!
          const dataUrl = receiptCanvas.toDataURL("image/png");

          console.log("[PRINT] Sending to server, size:", dataUrl.length);
          if (ws && ws.readyState === 1)
            ws.send(
              JSON.stringify({
                type: "log",
                msg: "[PRINT] Sending to server, size: " + dataUrl.length,
              }),
            );
          const response = await fetch("/api/print", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: dataUrl }),
          });
          console.log("[PRINT] Response:", response.status);
          const result = await response.json();

          if (result.success) {
            btnRow.classList.add("hidden");
            document.getElementById("thresholdControl").classList.add("hidden");
            thankYouMsg.classList.remove("hidden");
          } else {
            btnPrint.textContent = "Print Failed";
            btnPrint.disabled = false;
            alert("Print error: " + result.error);
          }
        } catch (e) {
          console.error("[PRINT] Error:", e);
          btnPrint.textContent = "Print Failed";
          btnPrint.disabled = false;
          alert("Error: " + e.message);
        }
      });
    </script>
  </body>
</html>
